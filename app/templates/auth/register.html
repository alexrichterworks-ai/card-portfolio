{% extends "base.html" %}
{% block title %}Register — Card Portfolio{% endblock %}
{% block content %}
<div style="max-width:400px; margin:5rem auto;">
  <div class="card">
    <h1 style="margin-bottom:1.5rem;">Create account</h1>
    <form method="POST">
      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" required autofocus>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" required minlength="8">
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%; margin-top:0.5rem;">Create account</button>
    </form>
    <p style="margin-top:1rem; font-size:0.85rem; color:#64748b; text-align:center;">
      Already have an account? <a href="{{ url_for('auth.login') }}">Sign in</a>
    </p>
  </div>
</div>
{% endblock %}
